<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Oswald:wght@200..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Peepo's Strongman Quiz</title>
  </head>
  <body>
    <main>
      <h1>Peepo's Strongman quiz!</h1>
      <div class="startGame">
        <button class="btnStart">START</button>
      </div>
      <p>Points:</p>
      <p id="points">0</p>
      <section class="qImgBox">
        <img
          src="./Imgs/tomStoltmanStones.jpg"
          alt="Tom Stoltman Lifting the Atlas Stones"
        />
      </section>
      <div class="quizGrid" id="answerContainer">
        <div><button id="answerA" class="btn btn--answer"></button></div>
        <div><button id="answerB" class="btn btn--answer"></button></div>
        <div><button id="answerC" class="btn btn--answer"></button></div>
        <div><button id="answerD" class="btn btn--answer"></button></div>
      </div>
      <button class="btnNext btn-vanish">next</button>
      <div class="questionText"><p>Question: (Placeholder)</p></div>
      <button class="btnPlayAgain btn-vanish"></button>
    </main>
    <div class="peepoImg">
      <img src="./Sprites/PeePoRizz.png" alt="" />
    </div>
  </body>
  <script src="./index.js"></script>
</html>
